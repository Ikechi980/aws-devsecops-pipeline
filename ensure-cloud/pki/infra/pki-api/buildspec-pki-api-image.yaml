version: 0.2

env:
  parameter-store:
    DOCKER_HUB_USERNAME: "/docker_sentrics/credentials/DOCKER_HUB_USERNAME"
    DOCKER_HUB_PASSWORD: "/docker_sentrics/credentials/DOCKER_HUB_PASSWORD"
  variables:
    IMAGE_REPO_NAME: "ensure-cloud-pki-api"
    QUARANTINE_BUCKET: "sentrics-ensure-terraform-state-codepipeline-cache"
    QUARANTINE_PREFIX: "ensure-cloud-security-quarantine"

phases:
  pre_build:
    commands:
      - echo "=== CHECKING CACHE DIRECTORIES ==="
      - ls -la /root/.cache || echo "Cache dir not found"
      - ls -la /root/.docker || echo "Docker cache dir not found"
      - echo "=== END CACHE CHECK ==="
      - export RUST_VERSION="$(./scripts/ci/rust-version.sh)"
      - echo "Using pinned Rust builder toolchain ${RUST_VERSION}"
      - echo "Using image repository $IMAGE_REPO_NAME"
      - echo "Logging into Docker Hub"
      - echo "$DOCKER_HUB_PASSWORD" | docker login --username "$DOCKER_HUB_USERNAME" --password-stdin
      - export EFFECTIVE_RELEASE_SHA="${RELEASE_SHA:-${CODEBUILD_RESOLVED_SOURCE_VERSION:-}}"
      - 'if [ -z "${EFFECTIVE_RELEASE_SHA}" ]; then echo "ERROR: RELEASE_SHA/CODEBUILD_RESOLVED_SOURCE_VERSION is empty."; exit 1; fi'
      - export IMAGE_TAG="$(echo "${EFFECTIVE_RELEASE_SHA}" | cut -c1-12)"
      - 'if [ -z "${IMAGE_REPO_NAME}" ]; then echo "ERROR: IMAGE_REPO_NAME is required."; exit 1; fi'
      - 'if [ -z "${ENVIRONMENT}" ]; then echo "ERROR: ENVIRONMENT is required."; exit 1; fi'

  build:
    commands:
      - echo "Building Docker image"
      - docker build --build-arg RUST_VERSION="${RUST_VERSION}" -t "$IMAGE_REPO_NAME:$IMAGE_TAG" -f pki/infra/pki-api/Dockerfile pki

  post_build:
    commands:
      - mkdir -p out
      - docker save "$IMAGE_REPO_NAME:$IMAGE_TAG" -o out/image.tar
      - |
        cat > out/metadata.json <<EOF
        {
          "artifact_type": "image",
          "deployable": "pki-api",
          "image_repo_name": "${IMAGE_REPO_NAME}",
          "image_tag": "${IMAGE_TAG}",
          "release_sha": "${IMAGE_TAG}",
          "local_image": "${IMAGE_REPO_NAME}:${IMAGE_TAG}"
        }
        EOF
      - 'echo "Image artifact ready: out/image.tar"'
      - export QUARANTINE_BASE="s3://${QUARANTINE_BUCKET}/${QUARANTINE_PREFIX}/${ENVIRONMENT}/${IMAGE_TAG}/images/pki-api"
      - aws s3 cp out/image.tar "${QUARANTINE_BASE}/image.tar"
      - aws s3 cp out/metadata.json "${QUARANTINE_BASE}/metadata.json"
      - echo "Uploaded quarantine image artifact to ${QUARANTINE_BASE}"

artifacts:
  files:
    - out/**/*

cache:
  paths:
    - /root/.cache/**/*
    - /root/.docker/**/*

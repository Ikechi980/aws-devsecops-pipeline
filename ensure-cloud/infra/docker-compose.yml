services:
  step-ca:
    image: smallstep/step-ca:0.30.1
    container_name: ensure-step-ca
    restart: unless-stopped
    init: true
    environment:
      - STEPPATH=/home/step
    command: >
      sh -c "if [ ! -f /home/step/config/ca.json ]; then echo 'Missing CA config. Run ./scripts/dev.sh run.'; exit 1; fi; exec step-ca --password-file /home/step/secrets/password.txt /home/step/config/ca.json"
    volumes:
      - ./stepca/data:/home/step
    ports:
      - "9100:9000"
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "-q", "-O", "-", "https://127.0.0.1:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  mock-systems-api:
    build:
      context: ./mock-systems-api
      dockerfile: Dockerfile
    container_name: ensure-mock-systems-api
    restart: unless-stopped
    init: true
    environment:
      - PORT=8081
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8081/communities/alpha"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 2s

  mock-core-resources-api:
    build:
      context: ./mock-core-resources-api
      dockerfile: Dockerfile
    container_name: ensure-mock-core-resources-api
    restart: unless-stopped
    init: true
    environment:
      - PORT=8082
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8082/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 2s

  mongodb:
    image: mongo:7.0.31
    container_name: ensure-mongodb
    restart: unless-stopped
    init: true
    environment:
      - MONGO_USERNAME=developer
      - MONGO_PASSWORD=developer
      - MONGO_DATABASE=global-events
      - MONGO_INITDB_DATABASE=global-events
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongodb/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  localstack:
    image: localstack/localstack:4.12.0
    container_name: ensure-localstack
    ports:
      - "4666:4566"
    environment:
      - SERVICES=sqs,sns,ssm
      - DEBUG=0
    volumes:
      - ./localstack:/etc/localstack/init/ready.d
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.29.7-alpine3.23
    container_name: ensure-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./stepca/data:/etc/nginx/stepca:ro
    ports:
      - "8443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/nginx-health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  localstack_data:
  mongodb_data:

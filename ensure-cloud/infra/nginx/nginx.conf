worker_processes 1;
events { worker_connections 1024; }

http {
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log debug;

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Extract ensure community id from client cert DN (CN=<community>.ensurelink.net)
    map $ssl_client_s_dn $ensure_community_id {
        default "";
        ~*CN=([a-z0-9-]+)\.ensurelink\.net $1;
    }

    server {
        listen 443 ssl;
        server_name localhost;

        # Server identity (simulates ALB's certificate)
        ssl_certificate /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # Client verification (simulates ALB Trust Store)
        ssl_client_certificate /etc/nginx/stepca/certs/root_ca.crt;
        ssl_verify_client on;

        # Gateway health endpoint
        location /gateway/v1/health {
            proxy_pass http://host.docker.internal:3000/v1/health;
            proxy_http_version 1.1;

            proxy_set_header X-Amzn-Mtls-Clientcert-Subject $ssl_client_s_dn;
        }

        # WebSocket endpoint
        location /gateway/v1/ws {
            proxy_pass http://host.docker.internal:3000/v1/ws;
            proxy_http_version 1.1;

            # WebSocket upgrade headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header X-Amzn-Mtls-Clientcert-Subject $ssl_client_s_dn;

            # Timeouts for long-lived connections
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # mTLS-protected API endpoints routed to local headend-api lambda
        location /api/v1/ {
            proxy_pass http://host.docker.internal:9202/lambda-url/headend-api/v1/;
            proxy_http_version 1.1;

            proxy_set_header X-Amzn-Mtls-Clientcert-Subject $ssl_client_s_dn;
            proxy_set_header x-ensure-community-id $ensure_community_id;
        }
    }

    # Health check server without client cert requirement
    server {
        listen 80;
        server_name localhost;

        location /nginx-health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }
}

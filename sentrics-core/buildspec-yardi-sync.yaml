version: 0.2

env:
  variables:
    QUARANTINE_BUCKET: "sentrics-ensure-terraform-state-codepipeline-cache"
    QUARANTINE_PREFIX: "sentrics-core-security-quarantine"
    IMAGE_REPO_NAME: "sentrics-core-yardi-sync-repo"

phases:
  pre_build:
    commands:
      # Check cache directories
      - echo "=== CHECKING CACHE DIRECTORIES ==="
      - ls -la /root/.cache || echo "Cache dir not found"
      - ls -la /root/.docker || echo "Docker cache dir not found"
      - echo "=== END CACHE CHECK ==="
      - export RUST_VERSION="$(./scripts/ci/rust-version.sh)"
      - echo "Using pinned Rust builder toolchain ${RUST_VERSION}"
      # Print ECR repo name
      - echo "Using ECR $IMAGE_REPO_NAME"
      # Get AWS account ID
      - ACCOUNT_ID=$(aws sts get-caller-identity --query "Account" --output text)
      # Use current region
      - REGION=$AWS_DEFAULT_REGION
      # Construct ECR URL
      - ECR_URL=$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com
      # Login to ECR
      - echo "Logging into ECR"
      - echo "$ECR_URL"
      - aws ecr get-login-password --region $REGION | docker login --username AWS --password-stdin $ECR_URL

      # Extract commit hash for tagging
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-12)
      - IMAGE_TAG="${COMMIT_HASH}"
      - 'if [ -z "${ENVIRONMENT}" ]; then echo "ERROR: ENVIRONMENT is required."; exit 1; fi'
      - QUARANTINE_BASE="s3://${QUARANTINE_BUCKET}/${QUARANTINE_PREFIX}/${ENVIRONMENT}/${COMMIT_HASH}"
      - QUARANTINE_IMAGE_PREFIX="${QUARANTINE_BASE}/images/yardi-sync"
      - LOCAL_IMAGE="${IMAGE_REPO_NAME}:${IMAGE_TAG}"
      - echo "Using quarantine image prefix ${QUARANTINE_IMAGE_PREFIX}"

  build:
    commands:
      # Build Docker image
      - echo "Building Docker image"
      - docker build --build-arg RUST_VERSION="${RUST_VERSION}" -t $IMAGE_REPO_NAME:$IMAGE_TAG -f yardi-sync/infra/yardi-sync/Dockerfile yardi-sync

      # Tag image with commit hash only
      - docker tag $IMAGE_REPO_NAME:$IMAGE_TAG $ECR_URL/$IMAGE_REPO_NAME:$IMAGE_TAG

  post_build:
    commands:
      # Quarantine image artifacts for security scan stage
      - echo "Saving image tar for quarantine..."
      - docker save -o image.tar $IMAGE_REPO_NAME:$IMAGE_TAG
      - |
        cat > metadata.json <<EOF
        {
          "deployable": "yardi-sync",
          "image_repo_name": "${IMAGE_REPO_NAME}",
          "image_tag": "${IMAGE_TAG}",
          "local_image": "${LOCAL_IMAGE}"
        }
        EOF
      - echo "Uploading quarantine image artifacts..."
      - aws s3 cp metadata.json "${QUARANTINE_IMAGE_PREFIX}/metadata.json"
      - aws s3 cp image.tar "${QUARANTINE_IMAGE_PREFIX}/image.tar"
      - echo "Uploaded quarantine artifacts to ${QUARANTINE_IMAGE_PREFIX}"

cache:
  paths:
    - /root/.cache/**/*
    - /root/.docker/**/*

    
